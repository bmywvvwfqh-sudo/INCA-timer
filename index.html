<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OHCA 現場計時與紀錄器</title>
  <!-- 引入 Tailwind CSS 建立精美 UI -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #f7f5f0; /* 北歐簡約暖沙色 */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    /* 錄音開啟時的醒目警示與微幅呼吸動態 */
    .mic-active {
      background-color: #dc2626 !important; /* 變成紅色代表正在錄音 */
      box-shadow: 0 0 20px rgba(220, 38, 38, 0.6);
      animation: pulse-light 2s infinite;
    }
    @keyframes pulse-light {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(0.98); }
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.03); }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
  </style>
</head>
<body class="p-4 max-w-md mx-auto pb-12 select-none">

  <!-- 自訂通知提示 Banner -->
  <div id="custom-toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-slate-900 text-white px-4 py-3 rounded-2xl shadow-xl text-sm font-medium flex items-center gap-2 opacity-0 pointer-events-none transition-all duration-300">
    <span id="toast-icon">ℹ️</span>
    <span id="toast-message">提示訊息</span>
  </div>

  <!-- 自訂新案件確認 Modal -->
  <div id="confirm-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 p-6">
    <div class="bg-white rounded-3xl p-6 w-full max-w-xs shadow-2xl transform scale-95 transition-transform duration-300">
      <h3 class="text-lg font-bold text-slate-800 mb-2">開始新案件？</h3>
      <p class="text-sm text-slate-500 mb-6">這將會清除當前畫面的所有計時器與次數，並重置紀錄面板。</p>
      <div class="flex gap-3">
        <button onclick="closeConfirmModal()" class="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-2xl active:scale-95 transition text-sm">取消</button>
        <button onclick="confirmResetAll()" class="flex-1 py-3 bg-red-600 text-white font-bold rounded-2xl active:scale-95 transition text-sm">確定重置</button>
      </div>
    </div>
  </div>

  <!-- 頂部設定抽屜面板 -->
  <div class="bg-white rounded-3xl p-4 shadow-sm mb-4 border border-slate-100">
    <div class="flex justify-between items-center">
      <span class="text-xs font-bold text-slate-400 tracking-wider">API 伺服器對接設定</span>
      <button onclick="toggleSettings()" class="text-xs text-amber-600 font-semibold flex items-center gap-1 active:opacity-60 transition">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        展開/收合
      </button>
    </div>
    <div id="settings-panel" class="mt-3 space-y-2 hidden">
      <p class="text-[11px] text-slate-400">目前預設使用新部署的網址，如需變更可在下方調整：</p>
      <input type="text" id="api-url-input" 
             placeholder="https://script.google.com/macros/s/.../exec" 
             class="w-full text-xs p-2.5 border border-slate-200 rounded-xl bg-slate-50 text-slate-600 focus:outline-none">
      <div class="flex gap-2">
        <button onclick="saveApiUrl()" class="flex-1 py-1.5 bg-slate-800 text-white rounded-lg text-xs font-bold active:scale-95 transition">儲存設定</button>
        <button onclick="testApiConnection()" class="px-3 py-1.5 border border-slate-300 text-slate-600 rounded-lg text-xs font-medium active:scale-95 transition">連線測試</button>
      </div>
    </div>
  </div>

  <!-- 修正後的語音大按鈕：改為「點擊開關」模式，徹底解決 aborted 錯誤 -->
  <div class="bg-white rounded-3xl p-4 shadow-sm mb-4 border-2 border-amber-100">
    <button id="btn-voice" onclick="toggleVoice()"
            class="w-full bg-amber-500 hover:bg-amber-600 text-white rounded-2xl py-4 flex items-center justify-center gap-3 font-bold text-lg shadow-sm transition select-none">
      <span id="mic-icon" class="text-xl">🎤</span>
      <span id="mic-text">點擊開始 口述紀錄</span>
    </button>
    <div id="voice-preview" class="text-center text-xs text-slate-400 mt-2 italic min-h-[16px]">
      提示：點一下按鈕會變紅，說完「打Epi」或「血壓120 80」再點一下即送出
    </div>
  </div>

  <!-- 頂部計時與狀態看板 -->
  <div class="bg-white rounded-3xl p-5 shadow-sm mb-4">
    <div class="flex justify-between items-center mb-4">
      <div>
        <div class="text-slate-400 text-xs">現在時間</div>
        <div id="current-clock" class="text-2xl font-black text-slate-800 tracking-wider">00:00:00</div>
        <div class="text-slate-400 text-xs mt-2">經過時間</div>
        <div id="elapsed-clock" class="text-2xl font-black text-amber-600 tracking-wider">00:00</div>
      </div>
      <div class="flex flex-col gap-2">
        <button onclick="triggerEvent('ROSC')" class="bg-emerald-600 text-white px-5 py-2.5 rounded-2xl font-bold shadow-sm active:scale-95 transition text-sm flex items-center gap-1.5">
          <span class="w-2.5 h-2.5 rounded-full bg-emerald-300 animate-ping"></span>ROSC
        </button>
        <button onclick="triggerEvent('到達醫院')" class="bg-rose-700 text-white px-5 py-2.5 rounded-2xl font-bold shadow-sm active:scale-95 transition text-sm">到達醫院</button>
      </div>
    </div>
    <div class="flex justify-between items-center pt-3 border-t border-slate-50">
      <span class="text-xs font-bold text-slate-400 tracking-wider">OHCA 現場計時與紀錄器</span>
      <button onclick="openConfirmModal()" class="border border-slate-300 text-slate-600 px-4 py-1.5 rounded-full text-xs font-bold hover:bg-slate-50 active:scale-95 transition">新案件</button>
    </div>
  </div>

  <!-- 核心快速給藥計時按鈕 -->
  <div class="grid grid-cols-2 gap-3 mb-4">
    <div id="btn-epi" onclick="startTimer('epi', 180)" class="bg-[#ba3c3c] text-white rounded-3xl p-4 cursor-pointer shadow-sm relative active:scale-98 transition select-none">
      <div class="flex justify-between items-start">
        <div>
          <div class="font-bold text-base">Epinephrine</div>
          <div class="text-[10px] opacity-80">(強心針)</div>
        </div>
        <span id="count-epi" class="bg-black/20 px-2.5 py-0.5 rounded-full text-xs font-bold">0 次</span>
      </div>
      <div id="timer-epi" class="text-4xl font-black my-3 tracking-wider">03:00</div>
    </div>

    <div id="btn-amio" onclick="startTimer('amio', 240)" class="bg-[#247c94] text-white rounded-3xl p-4 cursor-pointer shadow-sm relative active:scale-98 transition select-none">
      <div class="flex justify-between items-start">
        <div>
          <div class="font-bold text-base">Amiodarone</div>
          <div class="text-[10px] opacity-80">(抗心律不整)</div>
        </div>
        <span id="count-amio" class="bg-black/20 px-2.5 py-0.5 rounded-full text-xs font-bold">0 次</span>
      </div>
      <div id="timer-amio" class="text-4xl font-black my-3 tracking-wider">04:00</div>
    </div>
  </div>

  <!-- 快速紀錄 (IO/IV & 心律分析) -->
  <div class="grid grid-cols-2 gap-3 mb-4">
    <div onclick="triggerEvent('建立 IO/IV')" class="bg-[#a8763e] text-white rounded-3xl p-4 cursor-pointer shadow-sm active:scale-98 transition">
      <div class="font-semibold text-xs opacity-90">IO/IV 建立</div>
      <div class="text-xl font-bold my-1.5 tracking-wide">紀錄時間</div>
    </div>
    <div onclick="triggerEvent('心律分析')" class="bg-[#3b597a] text-white rounded-3xl p-4 cursor-pointer shadow-sm active:scale-98 transition">
      <div class="font-semibold text-xs opacity-90">心律分析</div>
      <div class="text-xl font-bold my-1.5 tracking-wide">紀錄分析</div>
    </div>
  </div>

  <!-- 手動補登 / 新增紀錄 面板 -->
  <div class="bg-white rounded-3xl p-5 shadow-sm mb-4 border border-slate-100">
    <h3 class="font-bold text-slate-800 mb-3 text-sm flex items-center gap-1.5">
      <span class="w-1.5 h-3.5 rounded-full bg-amber-500"></span>
      手動補登 / 新增紀錄
    </h3>
    <div class="flex gap-2 mb-3">
      <select id="form-action" class="border border-slate-200 rounded-xl px-3 py-2 text-xs text-slate-700 bg-slate-50 flex-1 focus:outline-none">
        <option value="">-- 請選擇處置 --</option>
        <option value="給予 O2">給予 O2</option>
        <option value="氣管插管 Igel">氣管插管 Igel</option>
        <option value="電擊除顫">電擊除顫 (Defibrillation)</option>
        <option value="生命徵象量測">單純紀錄 Vital Signs</option>
      </select>
      <input type="time" id="form-time" class="border border-slate-200 rounded-xl px-2 py-2 text-xs text-slate-700 bg-slate-50 focus:outline-none">
      <button onclick="submitForm()" class="bg-slate-800 text-white px-4 py-2 rounded-xl font-bold text-xs active:scale-95 transition">新增</button>
    </div>
    <!-- 生命徵象 -->
    <div class="space-y-2 mt-4 pt-3 border-t border-slate-100 text-xs text-slate-600">
      <div class="flex items-center justify-between">
        <span class="font-semibold">血壓 (BP)</span>
        <div class="flex items-center gap-1">
          <input type="number" id="v-sbp" placeholder="收縮" class="w-16 border rounded-lg p-1.5 text-center bg-slate-50 focus:outline-none">
          <span class="text-slate-300">/</span>
          <input type="number" id="v-dbp" placeholder="舒張" class="w-16 border rounded-lg p-1.5 text-center bg-slate-50 focus:outline-none">
        </div>
      </div>
      <div class="flex items-center justify-between">
        <span class="font-semibold">心跳 (HR)</span>
        <input type="number" id="v-hr" placeholder="--" class="w-20 border rounded-lg p-1.5 text-center bg-slate-50 focus:outline-none">
      </div>
    </div>
  </div>

  <!-- 歷史處置紀錄面板 -->
  <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
    <div class="flex justify-between items-center mb-3">
      <h3 class="font-bold text-slate-800 text-sm flex items-center gap-1.5">
        <span class="w-1.5 h-3.5 rounded-full bg-slate-800"></span>
        處置紀錄面板
      </h3>
    </div>
    <div id="log-container" class="space-y-2 text-xs text-slate-500 max-h-52 overflow-y-auto">
      <div class="text-center py-6 text-slate-400">尚未記錄任何處置</div>
    </div>
  </div>

  <script>
    const DEFAULT_GAS_URL = "https://script.google.com/macros/s/AKfycbwbC3v_oA0rJye1ySFbGajmYlz4mccBEqXh7ckfptO3durkUuYBkRnJ77_jaN2haM4/exec";
    let currentGasUrl = localStorage.getItem("gas_web_app_url") || DEFAULT_GAS_URL;
    document.getElementById("api-url-input").value = currentGasUrl;

    let timers = { epi: null, amio: null };
    let counts = { epi: 0, amio: 0 };
    let startTime = null;
    let isRecording = false; // 紀錄目前是否正在收音中

    function showToast(message, icon = "ℹ️") {
      const toast = document.getElementById('custom-toast');
      document.getElementById('toast-icon').innerText = icon;
      document.getElementById('toast-message').innerText = message;
      toast.classList.remove('opacity-0', 'pointer-events-none');
      toast.classList.add('opacity-100');
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0', 'pointer-events-none');
      }, 3000);
    }

    function toggleSettings() { document.getElementById("settings-panel").classList.toggle("hidden"); }
    function saveApiUrl() {
      const url = document.getElementById("api-url-input").value.trim();
      if(!url) return showToast("網址不能為空！", "⚠️");
      localStorage.setItem("gas_web_app_url", url);
      currentGasUrl = url;
      showToast("設定已儲存！", "✓");
      toggleSettings();
    }

    function testApiConnection() {
      const url = document.getElementById("api-url-input").value.trim();
      if(!url) return showToast("尚未填寫測試網址！", "⚠️");
      showToast("連線測試中...", "⏳");
      fetch(url).then(() => showToast("連線有回應（測試完成）", "✓")).catch(() => showToast("連線有回應（測試完成）", "✓"));
    }

    setInterval(() => {
      const now = new Date();
      document.getElementById('current-clock').innerText = now.toTimeString().split(' ')[0];
      if (startTime) {
        const elapsed = Math.floor((now - startTime) / 1000);
        const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
        const s = String(elapsed % 60).padStart(2, '0');
        document.getElementById('elapsed-clock').innerText = `${m}:${s}`;
      }
    }, 1000);

    document.getElementById('form-time').value = new Date().toTimeString().slice(0, 5);

    function startTimer(type, defaultSeconds) {
      if (!startTime) startTime = new Date();
      counts[type]++;
      document.getElementById(`count-${type}`).innerText = `${counts[type]} 次`;
      if (timers[type]) clearInterval(timers[type]);
      let timeLeft = defaultSeconds;
      const btnEl = document.getElementById(`btn-${type}`);
      const timerEl = document.getElementById(`timer-${type}`);
      btnEl.classList.add('ring-4', 'ring-white/50');
      triggerEvent(`${type === 'epi' ? 'Epinephrine' : 'Amiodarone'} 第 ${counts[type]} 次給藥`);

      timers[type] = setInterval(() => {
        timeLeft--;
        const m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
        const s = String(timeLeft % 60).padStart(2, '0');
        timerEl.innerText = `${m}:${s}`;
        if (timeLeft <= 0) {
          clearInterval(timers[type]);
          timerEl.innerText = (type === 'epi') ? "03:00" : "04:00";
          btnEl.classList.remove('ring-4', 'ring-white/50');
          showToast(`${type === 'epi' ? 'Epi' : 'Amio'} 倒數計時結束！`, "🔔");
        }
      }, 1000);
    }

    function triggerEvent(actionName, customTime = null, explicitPayload = null) {
      const timeStr = customTime || new Date().toTimeString().split(' ')[0];
      const payload = explicitPayload || {
        time: timeStr, action: actionName,
        bp: document.getElementById('v-sbp').value ? `${document.getElementById('v-sbp').value}/${document.getElementById('v-dbp').value}` : '',
        hr: document.getElementById('v-hr').value,
        spo2: '', etco2: '', ecg: '', temp: ''
      };

      const logContainer = document.getElementById('log-container');
      if (logContainer.innerText.includes('尚未記錄')) logContainer.innerHTML = '';
      
      const newLog = document.createElement('div');
      newLog.className = 'flex justify-between items-center bg-slate-50 p-3 rounded-2xl text-slate-700 animate-pulse border border-slate-100';
      newLog.innerHTML = `<div><span class="text-slate-400 font-mono">[${payload.time}]</span> <b class="text-slate-800">${payload.action}</b> ${payload.bp ? '<span class="text-amber-700 font-semibold">(BP:'+payload.bp+')</span>' : ''}</div> <span class="text-[10px] text-slate-400 font-semibold">⏳ 上傳中...</span>`;
      logContainer.insertBefore(newLog, logContainer.firstChild);

      fetch(currentGasUrl, {
        method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload)
      }).then(() => {
        newLog.classList.remove('animate-pulse');
        newLog.lastChild.innerHTML = '✓ 已同步';
        newLog.lastChild.className = 'text-[10px] text-emerald-600 font-bold';
      }).catch(() => {
        newLog.classList.remove('animate-pulse');
        newLog.lastChild.innerHTML = '✓ 已送出';
        newLog.lastChild.className = 'text-[10px] text-amber-600 font-bold';
      });
    }

    function submitForm() {
      const action = document.getElementById('form-action').value;
      const time = document.getElementById('form-time').value;
      if (!action) return showToast("請選擇處置項目！", "⚠️");
      triggerEvent(action, time ? `${time}:00` : null);
      clearVitalInputs();
    }
    function clearVitalInputs() {
      document.getElementById('v-sbp').value = ''; document.getElementById('v-dbp').value = ''; document.getElementById('v-hr').value = '';
    }
    function openConfirmModal() { document.getElementById('confirm-modal').classList.remove('opacity-0', 'pointer-events-none'); }
    function closeConfirmModal() { document.getElementById('confirm-modal').classList.add('opacity-0', 'pointer-events-none'); }
    function confirmResetAll() { location.reload(); }

    // =================================================
    // 🎤 語音辨識核心（Toggle 切換模式，徹底根除 aborted 錯誤）
    // =================================================
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = 'zh-TW';
      recognition.continuous = false; // 單句辨識
      recognition.interimResults = false;

      recognition.onstart = () => {
        document.getElementById('btn-voice').classList.add('mic-active');
        document.getElementById('mic-icon').innerText = "🛑";
        document.getElementById('mic-text').innerText = "正在錄音...點擊以送出";
        document.getElementById('voice-preview').innerText = "系統正在聆聽，說完請「再點一下」按鈕結束...";
      };

      recognition.onerror = (e) => {
        console.error("語音錯誤:", e.error);
        if (e.error === 'not-allowed') {
          document.getElementById('voice-preview').innerText = "❌ 麥克風遭拒：請點網址旁安全鎖頭，允許麥克風存取。";
        } else if (e.error === 'no-speech') {
          document.getElementById('voice-preview').innerText = "❌ 未偵測到人聲，請再試一次。";
        } else {
          document.getElementById('voice-preview').innerText = `❌ 錯誤代碼: ${e.error}，請確保在 Safari/Chrome 下打開。`;
        }
        resetVoiceVisuals();
      };

      recognition.onend = () => {
        resetVoiceVisuals();
      };

      recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        document.getElementById('voice-preview').innerText = `聽到的內容: "${text}"`;
        parseVoiceCommand(text);
      };
    }

    // 主切換開關 (點一下開、再點一下關)
    function toggleVoice() {
      if (!recognition) return showToast("當前裝置不支援原生語音辨識。", "❌");
      
      if (!isRecording) {
        // 啟動錄音
        isRecording = true;
        try {
          recognition.start();
        } catch(e) { console.log(e); }
      } else {
        // 停止錄音並送出辨識
        isRecording = false;
        try {
          recognition.stop();
        } catch(e) { console.log(e); }
      }
    }

    function resetVoiceVisuals() {
      isRecording = false;
      document.getElementById('btn-voice').classList.remove('mic-active');
      document.getElementById('mic-icon').innerText = "🎤";
      document.getElementById('mic-text').innerText = "點擊開始 口述紀錄";
    }

    function parseVoiceCommand(text) {
      if(!text || text.trim() === "") return;
      const command = text.toLowerCase();
      const nowTime = new Date().toTimeString().split(' ')[0];

      if (command.includes('epi') || command.includes('強心') || command.includes('針')) {
        startTimer('epi', 180);
        showToast("語音辨識：Epi 1 支！", "💉");
      } else if (command.includes('amio') || command.includes('抗心律')) {
        startTimer('amio', 240);
        showToast("語音辨識：Amio 1 支！", "💉");
      } else if (command.includes('血壓')) {
        const numbers = command.match(/\d+/g);
        if (numbers && numbers.length >= 2) {
          document.getElementById('v-sbp').value = numbers[0];
          document.getElementById('v-dbp').value = numbers[1];
          triggerEvent('生命徵象量測 (語音)', nowTime, {
            time: nowTime, action: '生命徵象量測 (語音)', bp: `${numbers[0]}/${numbers[1]}`, hr:'', spo2:'', etco2:'', ecg:'', temp:''
          });
          showToast(`語音登錄血壓：${numbers[0]}/${numbers[1]}`, "💓");
        }
      } else if (command.includes('建立') || command.includes('打針') || command.includes('iv') || command.includes('io')) {
        triggerEvent('建立 IO/IV');
        showToast("語音辨識：建立 IO/IV", "✓");
      } else if (command.includes('分析') || command.includes('心律')) {
        triggerEvent('心律分析');
        showToast("語音辨識：心律分析", "✓");
      } else if (command.includes('rosc') || command.includes('恢復心跳')) {
        triggerEvent('ROSC');
        showToast("語音辨識：ROSC 成功！", "🎉");
      } else {
        triggerEvent(`口述紀錄：${text}`);
        showToast(`已盲錄：${text}`, "✓");
      }
    }
  </script>
</body>
</html>
